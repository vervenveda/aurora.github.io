      padding: 30px 24px 20px 24px;

    .tagline {
      color: #347d99;
      font-size: 1.08em;
      margin-bottom: 1em;
    }
    #task-box {
      background: #fff;
      border-radius: 7px;
      padding: 7px 7px 7px 7px;
      box-shadow: 0 1.5px 7px #c3f5e636;
      font-size: 1.14em;
      min-height: 66px;
      margin-bottom: 1em;
      color: var(--text);
    }
    .button-row {
      display: flex;
      justify-content: center;
      gap: 7px;
      margin-bottom: 1.1em;
    }
    button {
      background: var(--button);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 7px 7px;
      font-size: 1em;
      font-weight: 555;
      box-shadow: 0 2px 7px #add;
      cursor: pointer;
      transition: background 0.18s, color 0.14s;
    }
    button:hover {
      background: var(--button-hover);
      color: var(--bg);
    }
    .progress-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 3px;
      margin: 3px;
    }
    .dot {
      width: 3px; height: 11px;
      border-radius: 50%;
      background: var(--tracker);
      display: flex;
      transition: background 0.18s;
      border: 2px solid #c2eae6;
    }
    .dot.done { background: var(--tracker-done); border-color: #ffe066; }
    .celebrate {
      color: var(--gold);
      font-size: 1.19em;
      margin-top: 0.6em;
      letter-spacing: 1.2px;
      font-weight: 600;
      text-shadow: 0 1px 2px #fff, 0 1.5px 0 #fd0a;
      display: none;
    }
    footer {
      color: #a2b8be;
      margin: 21px 0 0 0;
      font-size: .95em;
      letter-spacing: 0.2px;
      text-align: center;
    }
  </style>

  "Smile at your clean space and whisper, 'I made this space peaceful.'"
      
    ];
    // For 365: Just expand the TASKS array above!

    let idx = 0, completed = Array(TASKS.length).fill(false);
    const taskBox = document.getElementById("task-box");
    const progress = document.getElementById("progress");
    const celebrate = document.getElementById("celebrateMsg");

    function showTask() {
      taskBox.textContent = TASKS[idx];
      updateProgress();
      celebrate.style.display = completed[idx] ? "block" : "none";
    }

    function updateProgress() {
      progress.innerHTML = "";
      for (let i = 0; i < TASKS.length; ++i) {
        const dot = document.createElement("span");
        dot.className = "dot" + (completed[i] ? " done" : "");
        dot.title = `Task #${i+1}`;
        dot.onclick = ()=>toggleDone(i);
        progress.appendChild(dot);
      }
    }
    function toggleDone(i) {
      completed[i] = !completed[i];
      updateProgress();
      celebrate.style.display = completed[idx] ? "block" : "none";
    }

    document.getElementById("nextBtn").onclick = ()=>{
      idx = (idx+1)%TASKS.length; showTask();
    };
    document.getElementById("prevBtn").onclick = ()=>{
      idx = (idx-1+TASKS.length)%TASKS.length; showTask();
    };
    document.getElementById("randBtn").onclick = ()=>{
      idx = Math.floor(Math.random()*TASKS.length); showTask();
    };

    // Initialize
    showTask();
  </script>
</body>
</html>
