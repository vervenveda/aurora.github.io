<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Quiet Wins — Gold Thread Tapestry</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root{
  --bg:#05060a;
  --bg-soft:#0b0c10;
  --panel:#111318;
  --panel-soft:#151821;
  --ink:#f4f2ec;
  --gold:#d4af37;
  --gold-soft:rgba(212,175,55,0.35);
  --gold-faint:rgba(212,175,55,0.14);
  --muted:#b3b3b3;
}

/* RESET */
*{box-sizing:border-box}

html,body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family: "Georgia", "Times New Roman", serif;
  font-weight:300;
  height:100%;
}

/* --- LAYOUT --- */
body{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:12px;
  background:
    radial-gradient(circle at 10% 0%, #1f2837 0, transparent 55%),
    radial-gradient(circle at 90% 100%, #37274a 0, transparent 55%),
    radial-gradient(circle at 50% 100%, #1a1c24 0, transparent 60%),
    var(--bg-soft);
}

#app{
  width:100%;
  max-width:720px;
  max-height:900px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  border-radius:24px;
  overflow:hidden;
  background:radial-gradient(circle at top,#171922,#090a0f);
  box-shadow:
    0 28px 60px rgba(0,0,0,.75),
    0 0 0 1px rgba(255,255,255,.03);
}

/* --- HEADER --- */
header{
  text-align:center;
  padding:18px 18px 10px;
  font-size:20px;
  letter-spacing:.16em;
  font-weight:400;
  color:var(--gold);
  text-transform:uppercase;
  position:relative;
}

header::after{
  content:"gold thread tapestry";
  display:block;
  margin-top:4px;
  font-size:11px;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--muted);
}

header span.title-glow{
  text-shadow:
    0 0 6px rgba(212,175,55,.6),
    0 0 18px rgba(212,175,55,.25);
  animation:headerGlow 12s ease-in-out infinite;
}

@keyframes headerGlow{
  0%,100%{text-shadow:0 0 6px rgba(212,175,55,.5),0 0 14px rgba(212,175,55,.2);}
  50%{text-shadow:0 0 10px rgba(212,175,55,.9),0 0 26px rgba(212,175,55,.4);}
}

/* --- TAPESTRY WRAP --- */
#tapestryWrap{
  flex:1;
  position:relative;
  margin:0 16px;
  padding:12px;
  border-radius:20px;
  background:
    radial-gradient(circle at 0% 0%,rgba(212,175,55,.06),transparent 60%),
    radial-gradient(circle at 100% 100%,rgba(148,163,184,.14),transparent 55%),
    radial-gradient(circle at 50% 0%,#05060a,#05060a);
  box-shadow:
    0 16px 40px rgba(0,0,0,.7),
    0 0 0 1px rgba(255,255,255,.04);
}

#tapestryWrap::before{
  content:"";
  position:absolute;
  inset:4px;
  border-radius:18px;
  background:conic-gradient(
    from 140deg,
    rgba(212,175,55,.4),
    transparent 16%,
    transparent 60%,
    rgba(212,175,55,.32),
    transparent 86%,
    transparent
  );
  mix-blend-mode:screen;
  opacity:.18;
  pointer-events:none;
  animation:framePulse 16s ease-in-out infinite;
}

@keyframes framePulse{
  0%,100%{opacity:.15;}
  50%{opacity:.32;}
}

/* CANVAS */
canvas{
  width:100%;
  height:100%;
  display:block;
  border-radius:14px;
  background:
    radial-gradient(circle at 10% 5%, rgba(212,175,55,.06), transparent 55%),
    radial-gradient(circle at 90% 95%, rgba(212,175,55,.10), transparent 55%),
    radial-gradient(circle at 50% 50%, #05060a, #05060a);
  box-shadow:
    inset 0 0 30px rgba(0,0,0,.8),
    0 0 0 1px rgba(255,255,255,.04);
}

.tapestry-label{
  position:absolute;
  right:20px;
  bottom:16px;
  font-size:10px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:rgba(243,244,246,.55);
  pointer-events:none;
}

/* --- PANEL --- */
#panel{
  background:var(--panel);
  padding:18px 18px 20px;
  border-top:1px solid rgba(255,255,255,.04);
}

/* PROMPT */
.prompt{
  text-align:center;
  font-size:18px;
  line-height:1.5;
  margin-bottom:14px;
  font-weight:300;
}

/* INPUT */
textarea{
  width:100%;
  min-height:70px;
  background:#0e1015;
  color:var(--ink);
  border:1px solid rgba(255,255,255,.12);
  border-radius:10px;
  padding:10px 11px;
  font-family:inherit;
  font-weight:300;
  resize:none;
  font-size:14px;
}

textarea::placeholder{
  color:#888;
  font-weight:300;
}

/* BUTTONS */
.buttons{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:14px;
  flex-wrap:wrap;
}

button{
  background:transparent;
  color:var(--gold);
  border:1px solid var(--gold-soft);
  border-radius:22px;
  padding:8px 18px;
  font-size:13px;
  font-weight:300;
  letter-spacing:.08em;
  cursor:pointer;
  text-transform:uppercase;
  font-family:inherit;
}

button:hover{
  background:rgba(212,175,55,.08);
}

button.secondary{
  color:var(--muted);
  border-color:rgba(255,255,255,.18);
}

button.secondary:hover{
  background:rgba(148,163,184,.06);
}

/* AFFIRMATION / CLOSING */
#affirmation{
  margin-top:14px;
  text-align:center;
  font-size:15px;
  font-weight:300;
  color:var(--muted);
  min-height:1.4em;
  opacity:0;
  transform:translateY(4px);
  transition:opacity 1.1s ease, transform 1.1s ease;
}
#affirmation.show{
  opacity:1;
  transform:translateY(0);
}

/* ARRIVAL OVERLAY */
#arrivalOverlay{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
  background:
    radial-gradient(circle at 0 0, rgba(212,175,55,.16), transparent 55%),
    radial-gradient(circle at 100% 100%, rgba(148,163,184,.24), transparent 55%),
    rgba(5,6,10,.96);
  z-index:10;
}

.arrival-card{
  width:100%;
  max-width:420px;
  background:rgba(17,19,24,.96);
  border-radius:18px;
  border:1px solid rgba(212,175,55,.45);
  box-shadow:0 22px 58px rgba(0,0,0,.9);
  padding:22px 20px 18px;
  text-align:center;
}

.arrival-title{
  font-size:18px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:10px;
}

.arrival-line{
  font-size:17px;
  line-height:1.6;
  margin-bottom:10px;
}

.arrival-note{
  font-size:13px;
  color:var(--muted);
  margin-bottom:16px;
}

.arrival-buttons{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

/* MOBILE */
@media (max-width:640px){
  #app{
    border-radius:18px;
  }
  header{
    padding-top:14px;
  }
  .prompt{
    font-size:16px;
  }
}
</style>
</head>

<body>
<div id="app">

  <!-- Arrival / Gentle Gate -->
  <div id="arrivalOverlay">
    <div class="arrival-card">
      <div class="arrival-title">Quiet Wins</div>
      <div class="arrival-line" id="arrivalLine"></div>
      <div class="arrival-note">
        Nothing here is a test. You can leave at any moment.  
        What you carried today is allowed to exist exactly as it is.
      </div>
      <div class="arrival-buttons">
        <button id="arrivalBegin">Begin</button>
        <button id="arrivalNotToday" class="secondary">Not today</button>
      </div>
    </div>
  </div>

  <header><span class="title-glow">Quiet Wins</span></header>

  <div id="tapestryWrap">
    <canvas id="tapestry"></canvas>
    <div class="tapestry-label">quiet wins gathered here</div>
  </div>

  <div id="panel">
    <div class="prompt" id="prompt"></div>

    <textarea id="response" placeholder="You can write… or not."></textarea>

    <div class="buttons">
      <button id="weave">Weave thread</button>
      <button class="secondary" id="skip">I don’t want to put it into words</button>
    </div>

    <div id="affirmation"></div>
  </div>

</div>

<script>
/* =========================================================
   QUIET WINS — SOVEREIGN MONTE CARLO TAPESTRY (v2)
   All data is local to this browser. No servers. No streaks.
   ========================================================= */

(function(){
  "use strict";

  const KEY      = "quiet_wins_tapestry_v2";
  const META_KEY = "quiet_wins_meta_v2";

  /* --- LOAD STATE --- */
  let threads = [];
  try{
    const raw = localStorage.getItem(KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    threads = Array.isArray(parsed) ? parsed : [];
  }catch(e){
    threads = [];
  }

  let meta = {};
  try{
    meta = JSON.parse(localStorage.getItem(META_KEY) || "{}") || {};
  }catch(e){
    meta = {};
  }

  /* --- PROMPTS --- */
  const PROMPTS = [
    "What did you carry today that no one saw?",
    "Name one thing you protected.",
    "What took effort, even if it looked small?",
    "What did you keep going through?",
    "What are you tired of holding?",
    "What mattered today, quietly?",
    "Where did you show up without recognition?",
    "What weight are you allowed to set down here?",
    "What did you say \"yes\" to that cost you something?",
    "Where did you choose gentleness over speed?",
    "What did you hold together for someone else?",
    "Where did you show restraint when no one was watching?"
  ];

  /* --- AFFIRMATIONS --- */
  const AFFIRMATIONS = [
    "That mattered.",
    "You weren’t imagining the weight.",
    "You showed up in a way that counts.",
    "Enough was enough.",
    "You carried something real.",
    "Nothing about this was small.",
    "Your effort lives here now, not just in your body.",
    "You were not invisible to this moment.",
    "This landed.",
    "It was never \"just in your head.\""
  ];

  const SKIP_AFFIRMATIONS = [
    "You don’t have to explain it for it to be real.",
    "Even without words, this counted.",
    "Silence is still a kind of truth.",
    "Your \"no\" belongs here too.",
    "You are allowed to stay unread and still be worthy.",
    "Not naming it is still honoring it."
  ];

  /* --- ARRIVAL LINES --- */
  const ARRIVAL_LINES = [
    "You made it here.",
    "This moment counts too.",
    "You don’t have to be impressive.",
    "Arriving is already enough.",
    "There is nothing you have to perform."
  ];

  /* --- DOM REFS --- */
  const canvas      = document.getElementById("tapestry");
  const ctx         = canvas.getContext && canvas.getContext("2d");
  const promptEl    = document.getElementById("prompt");
  const affEl       = document.getElementById("affirmation");
  const responseEl  = document.getElementById("response");
  const weaveBtn    = document.getElementById("weave");
  const skipBtn     = document.getElementById("skip");
  const arrivalOverlay = document.getElementById("arrivalOverlay");
  const arrivalLineEl  = document.getElementById("arrivalLine");
  const arrivalBegin   = document.getElementById("arrivalBegin");
  const arrivalNotToday= document.getElementById("arrivalNotToday");

  if(!canvas || !ctx) return;

  /* --- PROMPT CYCLING --- */
  let currentPromptIndex = pickPromptIndex(-1);
  promptEl.textContent = PROMPTS[currentPromptIndex];

  function pickPromptIndex(prev){
    if(PROMPTS.length <= 1) return 0;
    let idx;
    do{
      idx = Math.floor(Math.random() * PROMPTS.length);
    }while(idx === prev);
    return idx;
  }

  function showNextPrompt(){
    currentPromptIndex = pickPromptIndex(currentPromptIndex);
    promptEl.textContent = PROMPTS[currentPromptIndex];
  }

  /* --- CANVAS SIZE & DRAW --- */
  function resize(){
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    drawAll();
  }

  window.addEventListener("resize", resize);

  function drawThread(t){
    if(!t || !t.points || !t.points.length) return;
    const pts = t.points;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for(let i=1;i<pts.length;i++){
      ctx.lineTo(pts[i].x, pts[i].y);
    }
    ctx.strokeStyle = `rgba(212,175,55,${t.alpha || 0.3})`;
    ctx.lineWidth   = t.width || 1;
    ctx.lineCap     = "round";
    ctx.lineJoin    = "round";
    ctx.stroke();
  }

  function drawThreads(list){
    const rect = canvas.getBoundingClientRect();
    ctx.clearRect(0, 0, rect.width, rect.height);
    list.forEach(drawThread);
  }

  function drawAll(){
    drawThreads(threads);
  }

  /* --- THREAD GENERATION (MONTE CARLO) --- */
  function generateThread(intensity){
    const rect = canvas.getBoundingClientRect();
    const w = rect.width || 1;
    const h = rect.height || 1;

    const steps = 12 + Math.floor(Math.random() * 10);
    const points = [];

    let x = Math.random() * w;
    let y = Math.random() * h;

    for(let i=0;i<steps;i++){
      x += (Math.random() - 0.5) * 80;
      y += (Math.random() - 0.5) * 80;
      // keep inside bounds softly
      x = Math.max(8, Math.min(w - 8, x));
      y = Math.max(8, Math.min(h - 8, y));
      points.push({x,y});
    }

    const base = Math.max(0.15, Math.min(1, intensity || 0.25));
    const width = 0.6 + 1.5 * base;
    const alpha = 0.22 + 0.35 * base;

    return { points, width, alpha };
  }

  /* --- ANIMATED WEAVE --- */
  function animateNewThread(newThread){
    const baseThreads = threads.slice(0, threads.length - 1);
    const pts = newThread.points || [];
    if(!pts.length){
      drawAll();
      return;
    }
    const rect = canvas.getBoundingClientRect();
    let index = 1;

    function frame(){
      ctx.clearRect(0,0,rect.width,rect.height);
      baseThreads.forEach(drawThread);

      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for(let i=1;i<=index && i<pts.length;i++){
        ctx.lineTo(pts[i].x, pts[i].y);
      }
      ctx.strokeStyle = `rgba(212,175,55,${newThread.alpha || 0.3})`;
      ctx.lineWidth   = newThread.width || 1;
      ctx.lineCap     = "round";
      ctx.lineJoin    = "round";
      ctx.stroke();

      if(index < pts.length - 1){
        index++;
        requestAnimationFrame(frame);
      }else{
        drawAll();
        flickerSpark(pts[pts.length-1]);
      }
    }

    frame();
  }

  function flickerSpark(p){
    let life = 0;
    const maxLife = 28;

    function f(){
      drawAll();
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      const t = life / maxLife;
      const radius = 3 + t * 12;
      ctx.beginPath();
      ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(212,175,55,${0.5 * (1 - t)})`;
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();

      life++;
      if(life < maxLife){
        requestAnimationFrame(f);
      }else{
        drawAll();
      }
    }

    f();
  }

  /* --- META / SESSIONS --- */
  function recordSession(kind){
    meta.lastSession = Date.now();
    meta.lastKind    = kind;
    try{
      localStorage.setItem(META_KEY, JSON.stringify(meta));
    }catch(e){}
  }

  function bootAffirmation(){
    if(!affEl) return;
    affEl.classList.remove("show");

    if(!threads.length && !meta.lastSession){
      affEl.textContent = "You don’t have to be impressive here.";
      affEl.classList.add("show");
      return;
    }

    if(meta.lastSession){
      const days = (Date.now() - meta.lastSession) / (1000 * 60 * 60 * 24);
      if(days >= 7){
        affEl.textContent = "Nothing was lost while you were gone.";
        affEl.classList.add("show");
      }
    }
  }

  /* --- WEAVE LOGIC --- */
  function chooseAffirmation(fromSkip){
    const list = fromSkip ? SKIP_AFFIRMATIONS : AFFIRMATIONS;
    return list[Math.floor(Math.random() * list.length)];
  }

  function weave(fromSkip){
    if(!ctx) return;

    const text = (responseEl.value || "").trim();
    let intensity;

    if(fromSkip){
      intensity = 0.18;
    }else{
      const len = text.length;
      intensity = len ? Math.min(1, len / 280) : 0.25;
    }

    const thread = generateThread(intensity);
    threads.push(thread);
    try{
      localStorage.setItem(KEY, JSON.stringify(threads));
    }catch(e){}

    animateNewThread(thread);

    if(affEl){
      affEl.textContent = chooseAffirmation(fromSkip);
      affEl.classList.remove("show");
      // restart fade
      void affEl.offsetWidth;
      affEl.classList.add("show");
    }

    responseEl.value = "";
    recordSession(fromSkip ? "no_words" : "written");
    showNextPrompt();
  }

  /* --- ARRIVAL GATE --- */
  function hideArrival(){
    if(arrivalOverlay){
      arrivalOverlay.style.display = "none";
    }
  }

  if(arrivalLineEl){
    arrivalLineEl.textContent =
      ARRIVAL_LINES[Math.floor(Math.random() * ARRIVAL_LINES.length)];
  }

  if(arrivalBegin){
    arrivalBegin.addEventListener("click", function(){
      hideArrival();
      bootAffirmation();
    });
  }

  if(arrivalNotToday){
    arrivalNotToday.addEventListener("click", function(){
      hideArrival();
      weave(true); // counts as a quiet session without words
    });
  }

  /* --- BUTTON BINDINGS --- */
  if(weaveBtn){
    weaveBtn.addEventListener("click", function(){
      weave(false);
    });
  }

  if(skipBtn){
    skipBtn.addEventListener("click", function(){
      weave(true);
    });
  }

  /* --- INIT --- */
  resize();
  bootAffirmation();

})();
</script>

</body>
</html>
