<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grounding Suite</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d4af37">

<style>
:root{
  --bg:#0b0b0b;
  --panel:#141414;
  --gold:#d4af37;
  --soft-gold:#bfa24a;
  --text:#f2f2f2;
  --muted:#999;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  display:flex;
  justify-content:center;
}

.app{
  width:100%;
  max-width:880px;
  padding:28px;
}

h1{
  text-align:center;
  font-weight:300;
  letter-spacing:0.18em;
  color:var(--gold);
  margin-bottom:6px;
}

.subtitle{
  text-align:center;
  font-size:0.9rem;
  color:var(--muted);
  margin-bottom:26px;
}

.panel{
  background:var(--panel);
  border:1px solid rgba(212,175,55,0.25);
  border-radius:14px;
  padding:22px;
  margin-bottom:22px;
}

.row{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  align-items:center;
  margin-bottom:12px;
}

label{
  font-size:0.85rem;
  color:var(--muted);
}

input,select,textarea,button{
  background:#000;
  color:var(--text);
  border:1px solid rgba(212,175,55,0.35);
  border-radius:6px;
  padding:8px 10px;
  font-size:0.9rem;
}

textarea{
  width:100%;
  min-height:110px;
}

button{
  cursor:pointer;
  transition:all .2s ease;
}

button:hover{
  border-color:var(--gold);
  color:var(--gold);
}

button.primary{
  border-color:var(--gold);
}

button.ghost{
  opacity:.8;
}

.timer{
  font-size:2.4rem;
  text-align:center;
  letter-spacing:.1em;
  color:var(--gold);
}

.category-display{
  text-align:center;
  font-size:1.35rem;
  margin-bottom:14px;
}

.instructions{
  font-size:.8rem;
  color:var(--muted);
  margin-bottom:6px;
}

.players{
  display:flex;
  gap:14px;
}

.player{flex:1}

.score{
  text-align:center;
  margin-top:8px;
  font-size:.9rem;
  color:var(--soft-gold);
}

.winner{
  text-align:center;
  margin-top:12px;
  font-size:1rem;
  color:var(--gold);
}

.footer{
  text-align:center;
  font-size:.75rem;
  color:var(--muted);
  margin-top:20px;
}

.hidden{display:none}
</style>
</head>

<body>
<div class="app">

<!-- ================================================= -->
<!-- CATEGORY GAME -->
<!-- ================================================= -->

<h1>CATEGORY</h1>
<div class="subtitle">Focus • Recall • Gentle Competition</div>

<div class="panel">
  <div class="row">
    <label>Category Pack</label>
    <select id="packSelect">
      <option value="general">General</option>
      <option value="calm">Calm</option>
      <option value="nostalgia">Nostalgia</option>
      <option value="nature">Nature</option>
      <option value="culture">Culture</option>
    </select>
    <button class="ghost" onclick="randomFromPack()">Random</button>
  </div>

  <div class="row">
    <label>Category</label>
    <input id="categoryInput" style="flex:1" placeholder="Or enter your own category…">
  </div>

  <div class="row">
    <label>Timer</label>
    <select id="timerSelect" onchange="toggleCustomTime()">
      <option value="30">30 seconds</option>
      <option value="60">1 minute</option>
      <option value="custom">Custom</option>
    </select>
    <input id="customTime" type="number" min="5" placeholder="Seconds" class="hidden">
  </div>

  <div class="row">
    <label>
      <input type="checkbox" id="twoPlayerToggle" onchange="togglePlayers()">
      Two Player Mode
    </label>
  </div>

  <div class="row">
    <button class="primary" onclick="startCategoryGame()">Begin</button>
    <button class="ghost" onclick="resetCategoryGame()">Reset</button>
  </div>
</div>

<div class="panel hidden" id="categoryGame">
  <div class="category-display" id="categoryDisplay"></div>
  <div class="timer" id="timer">00:00</div>

  <div class="players">
    <div class="player">
      <div class="instructions">Separate answers with commas.</div>
      <textarea id="p1Input"></textarea>
      <div class="score" id="p1Score"></div>
    </div>

    <div class="player hidden" id="p2Panel">
      <div class="instructions">Separate answers with commas.</div>
      <textarea id="p2Input"></textarea>
      <div class="score" id="p2Score"></div>
    </div>
  </div>

  <div class="winner" id="categoryWinner"></div>
</div>

<!-- ================================================= -->
<!-- ALPHABET GROUNDING -->
<!-- ================================================= -->

<h1>ALPHABET</h1>
<div class="subtitle" id="alphabetSubtitle">
  A grounding practice for awareness and presence
</div>

<div class="panel">
  <div class="row">
    <label><input type="checkbox" onchange="setMode('therapeutic',this.checked)"> Therapeutic</label>
    <label><input type="checkbox" onchange="setMode('child',this.checked)"> Child</label>
    <label><input type="checkbox" onchange="setMode('low',this.checked)"> Low-Stim</label>
  </div>
</div>

<div class="panel">
  <div class="instructions" id="instructionText">
    Look around your space. Find one object for each letter.
  </div>

  <div class="category-display" id="letterDisplay">A</div>

  <div class="row">
    <input id="objectInput" style="flex:1" placeholder="Type what you notice…">
    <button class="primary" onclick="submitLetter()">Enter</button>
  </div>

  <div class="row">
    <button class="ghost" onclick="skipLetter()">Skip</button>
    <button class="ghost" onclick="resetAlphabet()">Reset</button>
    <button class="ghost" onclick="toggleReflection()">Reflection</button>
  </div>

  <div class="score" id="progressDisplay">Letter 1 of 26</div>
  <div class="winner" id="breathCue"></div>
  <div class="winner" id="completionMessage"></div>
</div>

<div class="panel hidden" id="reflectionPanel">
  <h3 style="color:var(--gold);font-weight:300;">Reflection</h3>
  <ul id="reflectionList"></ul>
</div>

<div class="footer">
  Offline • Sovereign • No pressure
</div>

</div>

<script>
/* ================= CATEGORY GAME ================= */
const categoryPacks={
  general:["Dog Breeds","Ice Cream Flavors","Countries","Cities"],
  calm:["Soft Things","Comfort Foods","Safe Places"],
  nostalgia:["90s Movies","Cartoons","Old Games"],
  nature:["Trees","Birds","Flowers"],
  culture:["Instruments","Books","Art Styles"]
};

let catTimer, timeLeft;

function randomFromPack(){
  const p=document.getElementById("packSelect").value;
  const list=categoryPacks[p];
  document.getElementById("categoryInput").value=list[Math.floor(Math.random()*list.length)];
}

function toggleCustomTime(){
  document.getElementById("customTime").classList.toggle(
    "hidden", document.getElementById("timerSelect").value!=="custom"
  );
}

function togglePlayers(){
  document.getElementById("p2Panel").classList.toggle(
    "hidden", !document.getElementById("twoPlayerToggle").checked
  );
}

function startCategoryGame(){
  document.getElementById("categoryGame").classList.remove("hidden");
  const cat=document.getElementById("categoryInput").value||"Open Category";
  document.getElementById("categoryDisplay").textContent=cat;

  timeLeft=document.getElementById("timerSelect").value==="custom"
    ? parseInt(document.getElementById("customTime").value||30)
    : parseInt(document.getElementById("timerSelect").value);

  updateTimer();
  clearInterval(catTimer);
  catTimer=setInterval(()=>{
    timeLeft--; updateTimer();
    if(timeLeft<=0) endCategoryGame();
  },1000);
}

function updateTimer(){
  document.getElementById("timer").textContent=
    `00:${String(timeLeft).padStart(2,"0")}`;
}

function countCommaItems(text){
  return text.split(",").map(x=>x.trim()).filter(Boolean).length;
}

function endCategoryGame(){
  clearInterval(catTimer);
  const p1=countCommaItems(p1Input.value);
  p1Score.textContent=`Items: ${p1}`;

  if(!p2Panel.classList.contains("hidden")){
    const p2=countCommaItems(p2Input.value);
    p2Score.textContent=`Items: ${p2}`;
    categoryWinner.textContent=
      p1>p2?"Player One Wins":p2>p1?"Player Two Wins":"Tie";
  }
}

function resetCategoryGame(){
  clearInterval(catTimer);
  categoryGame.classList.add("hidden");
  p1Input.value=p2Input.value="";
  p1Score.textContent=p2Score.textContent=categoryWinner.textContent="";
}

/* ================= ALPHABET ================= */
const alphabet="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
let index=0,responses=[];
const modes={therapeutic:false,child:false,low:false};

const textSets={
  default:{
    instruction:"Look around your space. Find one object for each letter.",
    completion:"You’ve reached the end. Take a slow breath."
  },
  therapeutic:{
    instruction:"Gently notice one safe object that starts with this letter.",
    completion:"You’re finished. Notice your body and surroundings."
  },
  child:{
    instruction:"Find something fun that starts with this letter!",
    completion:"All done. Nice noticing!"
  }
};

function setMode(m,v){
  modes[m]=v;
  if(m==="low"){
    document.querySelectorAll(".subtitle,.footer,.instructions")
      .forEach(e=>e.style.display=v?"none":"block");
  }
  updateText();
}

function updateText(){
  instructionText.textContent=
    modes.child?textSets.child.instruction:
    modes.therapeutic?textSets.therapeutic.instruction:
    textSets.default.instruction;
}

function updateAlphabetUI(){
  letterDisplay.textContent=alphabet[index]||"✓";
  progressDisplay.textContent=`Letter ${index+1} of 26`;
  objectInput.value="";
  breathCue.textContent="";
  if((index+1)%5===0&&index>0) breathCue.textContent="Pause. Take one slow breath.";
}

function submitLetter(){
  if(!objectInput.value.trim())return;
  responses.push({l:alphabet[index],v:objectInput.value});
  advance();
}

function skipLetter(){
  responses.push({l:alphabet[index],v:"(skipped)"});
  advance();
}

function advance(){
  index++;
  if(index>=alphabet.length) completeAlphabet();
  else updateAlphabetUI();
}

function completeAlphabet(){
  objectInput.disabled=true;
  completionMessage.textContent=
    modes.child?textSets.child.completion:
    modes.therapeutic?textSets.therapeutic.completion:
    textSets.default.completion;
}

function resetAlphabet(){
  index=0;responses=[];
  objectInput.disabled=false;
  completionMessage.textContent="";
  updateAlphabetUI();
  renderReflection();
}

function toggleReflection(){
  reflectionPanel.classList.toggle("hidden");
  renderReflection();
}

function renderReflection(){
  reflectionList.innerHTML="";
  responses.forEach(r=>{
    const li=document.createElement("li");
    li.textContent=`${r.l}: ${r.v}`;
    reflectionList.appendChild(li);
  });
}

updateAlphabetUI(); updateText();

/* ================= PWA ================= */
if("serviceWorker"in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>
</body>
</html>
